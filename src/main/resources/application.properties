# ── SERVIDOR ───────────────────────────────────────────────────────────────────
# Puerto donde corre la API — usamos 8081 para no chocar con el chatbot Python
# que corre en el 8000
server.port=8081

# ── BASE DE DATOS ──────────────────────────────────────────────────────────────
# Misma base de datos que usa el chatbot bancario Python
# Así ambos sistemas comparten los mismos datos — como en producción real
spring.datasource.url=jdbc:postgresql://TU_HOST/neondb?sslmode=require
spring.datasource.username=TU_USUARIO
spring.datasource.password=TU_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / HIBERNATE ────────────────────────────────────────────────────────────
# none   → no toca las tablas existentes — importante porque ya tienen datos
# update → crearía/modificaría tablas — peligroso en producción
# create → recrearía las tablas — destruye los datos
spring.jpa.hibernate.ddl-auto=none

# Muestra las queries SQL en la consola — útil para debugging
# Cambiar a false en producción
spring.jpa.show-sql=true

# Dialecto de PostgreSQL — le dice a Hibernate cómo hablar con la DB
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect